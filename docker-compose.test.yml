networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.31.0.0/24

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5673:5672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      retries: 10

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5433:5432"
    volumes:
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/01-schemas.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app"]
      interval: 3s
      retries: 10

  mockserver:
    image: mockserver/mockserver:5.15.0
    ports:
      - "1080:1080"
    environment:
      MOCKSERVER_LOG_LEVEL: WARN

  producer:
    build:
      context: .
      dockerfile: apps/producer/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      PRODUCER_PORT: 3000
      LOG_LEVEL: warn
    ports:
      - "3010:3000"
    depends_on:
      rabbitmq:
        condition: service_healthy

  consumer:
    build:
      context: .
      dockerfile: apps/consumer/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      DATABASE_URL: postgres://app:app@postgres:5432/app
      DATABASE_SCHEMA: consumer
      LOG_LEVEL: warn
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy

  notifier:
    build:
      context: .
      dockerfile: apps/notifier/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      DATABASE_URL: postgres://app:app@postgres:5432/app
      DATABASE_SCHEMA: notifier
      TELEGRAM_BOT_TOKEN: test-token
      TELEGRAM_API_BASE_URL: http://mockserver:1080
      LOG_LEVEL: warn
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mockserver:
        condition: service_started
